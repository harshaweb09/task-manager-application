<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Task Manager Application</title>
    <script>
      const savedTheme = localStorage.getItem("theme") || "light";
      document.documentElement.setAttribute("data-theme", savedTheme);
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/remixicon@4.6.0/fonts/remixicon.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
    <script src="script.js" defer></script>
  </head>
  <body>
    <main>
      <div class="container">
        <nav>
          <h1>Task Manager</h1>
          <div class="nav-actions">
            <button type="button" class="nav-btn icon-btn" id="theme-toggle">
              <i class="ri-moon-fill"></i>
            </button>
            <button type="button" class="nav-btn" id="create">
              Create Task
            </button>
            <button type="button" class="nav-btn" id="clear-all">
              Clear All
            </button>
          </div>
        </nav>
        <div class="page-divider"></div>
        <div class="modal-overlay hidden">
          <div class="modal">
            <div class="modal-header">
              <h2>Create Task</h2>
              <button type="button" class="modal-close">×</button>
            </div>
            <form class="task-form">
              <div class="form-group">
                <label for="title">Task Title</label>
                <input type="text" id="title" placeholder="Enter task title" />
              </div>
              <div class="form-group">
                <label for="description"> Description </label>
                <textarea
                  id="description"
                  rows="4"
                  placeholder="Enter task description"
                ></textarea>
              </div>
              <div class="form-group">
                <label for="category"> Category </label>
                <select id="category">
                  <option value="study">📚 Study</option>
                  <option value="work">💼 Work</option>
                  <option value="personal">🏠 Personal</option>
                  <option value="health">💪 Health</option>
                  <option value="fitness">🏃 Fitness</option>
                  <option value="learning">🎓 Learning</option>
                  <option value="coding">💻 Coding</option>
                  <option value="project">🚀 Project</option>
                  <option value="meeting">📅 Meeting</option>
                  <option value="shopping">🛒 Shopping</option>
                  <option value="finance">💰 Finance</option>
                  <option value="travel">✈️ Travel</option>
                  <option value="family">👨‍👩‍👧 Family</option>
                  <option value="home">🏡 Home</option>
                  <option value="other">📌 Other</option>
                </select>
              </div>
              <button type="submit" id="submit-btn" class="submit-btn">
                Add Task
              </button>
            </form>
          </div>
        </div>
        <section class="task-container"></section>
      </div>
    </main>
  </body>
</html>
